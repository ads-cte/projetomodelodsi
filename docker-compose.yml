services:
  db:
    image: mysql:8.0
    container_name: mysql_protocolo
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: db_protocolo
      MYSQL_USER: ads_user
      MYSQL_PASSWORD: ads_password
    ports:
      - "3306:3306"
    networks:
      - projetoaccte-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projetoaccte-backend-modelo
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=db
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
    networks:
      - projetoaccte-network
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projetoaccte-frontend-modelo
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
    networks:
      - projetoaccte-network
    restart: unless-stopped

networks:
  projetoaccte-network:
    driver: bridge
